# ─────────────────────────────────────────────────────────────
#  Site settings — edit these first
# ─────────────────────────────────────────────────────────────
name: "Dr. Metin [Soyadı]"          # ← your full name
role_tr: "Uzman Doktor"             # ← your title in Turkish
role_en: "Specialist Doctor"        # ← your title in English
specialty_tr: "12 yıllık klinik deneyim"
specialty_en: "12 years of clinical experience"

email: "info@example.com"           # ← contact email shown on the site
phone: ""                           # optional, e.g. "+90 5xx xxx xx xx"

# Production URL. On GitHub Pages without a custom domain this is
# https://<username>.github.io/<repo>  → set baseurl to "/<repo>".
# With a custom domain (recommended) set url to your domain and baseurl to "".
url: "https://example.com"
baseurl: ""

# Third-party integrations (fill in when ready — see README.md)
booking:
  cal_url: ""                       # e.g. https://cal.com/dr-metin  (Cal.com booking link)
payments:
  iyzilink_url: ""                  # your iyziLink hosted payment page URL
  currency_note_tr: "Ödemeler güvenli iyzico sayfası üzerinden alınır. Kart bilgileriniz bu siteyle asla paylaşılmaz."
  currency_note_en: "Payments are taken on iyzico's secure page. Your card details are never shared with this website."
forms:
  web3forms_key: ""                 # free access key from https://web3forms.com (contact form)
video:
  doxy_url: ""                      # your Doxy.me room link, sent after booking

social:
  linkedin: ""
  instagram: ""

# ─────────────────────────────────────────────────────────────
#  Localization — jekyll-polyglot
# ─────────────────────────────────────────────────────────────
languages: ["tr", "en"]
default_lang: "tr"
exclude_from_localization: ["assets", "images", "favicon", "CNAME", ".nojekyll", "robots.txt"]
parallel_localization: false        # safer/deterministic on Windows; fine for a small site

# ─────────────────────────────────────────────────────────────
#  Build settings
# ─────────────────────────────────────────────────────────────
plugins:
  - jekyll-polyglot

sass:
  style: compressed

defaults:
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .github

# ─────────────────────────────────────────────────────────────
#  Site settings — edit these first
# ─────────────────────────────────────────────────────────────
name: "Dr. Metin Burunkaya"         # ← your full name
role_tr: "Doktor"                   # ← your title in Turkish
role_en: "Doctor"                   # ← your title in English
specialty_tr: "12 yıllık klinik deneyim"
specialty_en: "12 years of clinical experience"
photo: "/assets/img/metin.jpg"       # portrait shown on Home + About (leave "" to use the 🩺 icon)
logo: ""                             # brand logo in header + favicon; empty = use the 🩺 icon (file kept at /assets/img/logo.jpg for later)

email: "turkishonlinedoctor@gmail.com"   # ← contact email shown on the site
phone: ""                           # optional, e.g. "+90 5xx xxx xx xx"
# WhatsApp number is intentionally NOT stored here. The repo is public, so putting it
# here would expose it before payment. It lives ONLY in Shopier's post-payment
# "Sipariş Onay Mesajı", which reveals your wa.me link after the patient pays.

# Production URL. On GitHub Pages without a custom domain this is
# https://<username>.github.io/<repo>  → set baseurl to "/<repo>".
# With a custom domain (recommended) set url to your domain and baseurl to "".
url: "https://turkishonlinedoctor.com"
baseurl: ""

# Third-party integrations (fill in when ready — see README.md)
booking:
  cal_url: "https://cal.com/turkish-online-doctor-hrpjxv/30min"   # Cal.com booking link — pinned to the 30-min event so only that option shows
payments:
  planned_shopier_url: "https://www.shopier.com/turkishonlinedoctor/49111028"  # Shopier product for the 1000 TL PLANNED services (video / second opinion / test review)
  quick_shopier_url: "https://www.shopier.com/turkishonlinedoctor/49110597"    # Shopier product for "Quick Consultation" (2000 TL); post-payment message reveals your WhatsApp link
forms:
  web3forms_key: ""                 # free access key from https://web3forms.com (contact form)
video:
  platform_tr: "Google Meet"        # planned consultations are held on Google Meet
  platform_en: "Google Meet"        # (Cal.com creates the Meet link automatically once you connect your Google Calendar)

analytics:
  ga4_id: "G-CLJBLY9BDK"            # Google Analytics 4 Measurement ID (gtag.js) — loaded site-wide via head.html

social:
  linkedin: ""
  instagram: ""

# ─────────────────────────────────────────────────────────────
#  Localization — jekyll-polyglot
# ─────────────────────────────────────────────────────────────
languages: ["tr", "en"]
default_lang: "tr"
exclude_from_localization: ["assets", "images", "favicon", "CNAME", ".nojekyll", "robots.txt", "sitemap.xml"]
parallel_localization: false        # safer/deterministic on Windows; fine for a small site

# ─────────────────────────────────────────────────────────────
#  Build settings
# ─────────────────────────────────────────────────────────────
plugins:
  - jekyll-polyglot

sass:
  style: compressed

defaults:
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .github

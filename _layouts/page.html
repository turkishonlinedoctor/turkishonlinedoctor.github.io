---
layout: default
---
<section class="page-head">
  <div class="wrap">
    {% if page.title %}<h1>{{ page.title }}</h1>{% endif %}
    {% if page.subtitle %}<p class="lead">{{ page.subtitle }}</p>{% endif %}
  </div>
</section>
<section class="page-body">
  <div class="wrap prose">
    {{ content }}
  </div>
</section>
